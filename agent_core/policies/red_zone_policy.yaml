# Red Zone Policy for RadAgent
# Defines the strictest protection rules for core agent infrastructure

protected_files:
  schemas:
    - "agent_core/schemas/task_spec.py"
    - "agent_core/schemas/simulation_ir.py"
    - "agent_core/schemas/code_patch.py"
    - "agent_core/schemas/gate_result.py"
    - "agent_core/schemas/rag_context_pack.py"
    - "agent_core/schemas/g4_output_contract.py"
    - "agent_core/schemas/g4_to_tcad_contract.py"
    - "agent_core/schemas/tcad_input_contract.py"
    - "agent_core/schemas/tcad_output_contract.py"
    - "agent_core/schemas/tcad_to_spice_contract.py"
    - "agent_core/schemas/spice_output_contract.py"

  validators:
    - "agent_core/validators/schema_validator.py"
    - "agent_core/validators/unit_validator.py"
    - "agent_core/validators/file_permission_validator.py"
    - "agent_core/validators/patch_validator.py"
    - "agent_core/validators/data_contract_validator.py"
    - "agent_core/validators/physics_sanity_validator.py"

  policies:
    - "agent_core/policies/file_access_policy.yaml"
    - "agent_core/policies/gate_policy.yaml"
    - "agent_core/policies/rag_policy.yaml"
    - "agent_core/policies/red_zone_policy.yaml"

  graph:
    - "agent_core/graph/graph_builder.py"
    - "agent_core/graph/state.py"
    - "agent_core/graph/routes.py"

  gates:
    - "agent_core/nodes/run_gate_checks.py"

rules:
  modification:
    default: "reject"
    override_requires:
      - "explicit_user_written_consent"
      - "code_review_by_human"
      - "documented_reason"
    log_all_access_attempts: true

  deletion:
    default: "reject"
    never_allowed: true

  read:
    default: "allow"
    log: true

audit:
  log_file: "simulation_workspace/red_zone_audit.log"
  log_format: "json"
  include_timestamp: true
  include_reason: true

version: "1.0"
