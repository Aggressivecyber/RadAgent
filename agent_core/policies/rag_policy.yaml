# RAG Policy for RadAgent
# Controls RAG routing, retrieval, and sufficiency scoring

routing:
  keywords:
    geant4:
      - "particle transport"
      - "energy deposition"
      - "dose distribution"
      - "LET"
      - "fluence"
      - "geometry"
      - "material"
      - "source particle"
      - "physics list"
      - "scoring"
      - "sensitive detector"
      - "Geant4"
      - "G4"
    tcad:
      - "defect"
      - "trap"
      - "deep level"
      - "carrier lifetime"
      - "leakage current"
      - "IV curve"
      - "CV curve"
      - "transient current"
      - "device simulation"
      - "Sentaurus"
      - "Silvaco"
      - "TCAD"
      - "radiation damage"
      - "TID"
      - "displacement damage"
    spice:
      - "netlist"
      - "transient circuit"
      - "current source"
      - "voltage waveform"
      - "inverter"
      - "readout circuit"
      - "charge sensitive amplifier"
      - "SPICE"
      - "ngspice"
      - "HSPICE"
      - "LTspice"
      - "PWL"

  chain_keywords:
    g4_tcad:
      - "Geant4 to TCAD"
      - "energy deposition to defect"
      - "radiation device"
    g4_tcad_spice:
      - "Geant4 to TCAD to SPICE"
      - "radiation device circuit"
      - "transient current to circuit"
    tcad_spice:
      - "TCAD to SPICE"
      - "device to circuit"

  default_route: "geant4"

retrieval:
  max_results_per_query: 10
  min_relevance_score: 0.5
  required_context_types:
    - "manual_snippets"
    - "example_code"
    - "data_contracts"

sufficiency:
  scoring:
    has_manual_snippets: 0.30
    has_example_code: 0.25
    has_data_contracts: 0.20
    no_known_errors: 0.15
    has_benchmark_cases: 0.10
  thresholds:
    allow_rag: 0.90
    needs_web: 0.60
    block_no_context: 0.0
  minimum_required_score: 0.75

fallback:
  on_insufficient_context:
    - "broaden_query"
    - "web_search_supplement"
    - "request_user_clarification"
  web_search:
    allowed: true
    max_results: 5
    purpose: "supplement_only"
    requires_disclosure: true

version: "1.0"
