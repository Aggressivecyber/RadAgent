# File access policy for RadAgent patch validation.
# Classifies file paths into zones:
#   green  — always allowed (generated code, configs)
#   yellow — allowed with review (test files, scripts)
#   red    — never allowed via patch (schemas, validators, knowledge base)

green_zone:
  patterns:
    - "simulation_workspace/jobs/**"
    - "src/*.cc"
    - "include/*.hh"
    - "config/*.json"
    - "macros/*.mac"
    - "CMakeLists.txt"
    - "main.cc"

yellow_zone:
  patterns:
    - "tests/**"
    - "scripts/**"
    - "*.md"

red_zone:
  patterns:
    - "agent_core/**/*.py"
    - "agent_core/**/*.yaml"
    - "knowledge_base/**"
    - ".env"
    - ".git/**"
    - "*.sh"

default_action: reject
