# Gate Policy for RadAgent
# Defines execution order, retry limits, and failure behavior for each gate

gates:
  gate_0_rag_sufficiency:
    order: 0
    name: "RAG Sufficiency Gate"
    required: true
    max_retries: 3
    on_failure: "retrieve_context"
    score_threshold: 0.75

  gate_1_task_spec_schema:
    order: 1
    name: "Task Spec Schema Gate"
    required: true
    max_retries: 5
    on_failure: "build_task_spec"

  gate_2_simulation_ir_schema:
    order: 2
    name: "Simulation IR Schema Gate"
    required: true
    max_retries: 5
    on_failure: "build_simulation_ir"

  gate_3_patch_format:
    order: 3
    name: "Patch Format Gate"
    required: true
    max_retries: 3
    on_failure: "write_code_patch"

  gate_4_file_permission:
    order: 4
    name: "File Permission Gate"
    required: true
    max_retries: 1
    on_failure: "reject"
    block_on_red_zone: true

  gate_5_static_check:
    order: 5
    name: "Static Check Gate"
    required: true
    max_retries: 3
    on_failure: "write_fix_patch"
    tools:
      python: ["ruff", "mypy"]
      cpp: ["clang-format", "cppcheck"]
      json: ["jsonschema"]
      yaml: ["yaml_parser"]

  gate_6_build_parse:
    order: 6
    name: "Build/Parse Gate"
    required: true
    max_retries: 5
    on_failure: "write_fix_patch"

  gate_7_unit_test:
    order: 7
    name: "Unit Test Gate"
    required: true
    max_retries: 3
    on_failure: "write_fix_patch"
    minimum_coverage: 0.8

  gate_8_data_contract:
    order: 8
    name: "Data Contract Gate"
    required: true
    max_retries: 3
    on_failure: "write_fix_patch"

  gate_9_smoke_simulation:
    order: 9
    name: "Smoke Simulation Gate"
    required: true
    max_retries: 5
    on_failure: "write_fix_patch"
    g4_events_range: [10, 1000]
    tcad_complexity: "low"
    spice_duration_factor: 0.1

  gate_10_benchmark_regression:
    order: 10
    name: "Benchmark Regression Gate"
    required: false
    max_retries: 1
    on_failure: "warn_only"

  gate_11_physics_sanity:
    order: 11
    name: "Physics Sanity Gate"
    required: true
    max_retries: 3
    on_failure: "write_fix_patch"
    checks:
      - "no_negative_energy"
      - "no_negative_dose"
      - "no_zero_events"
      - "no_nan_inf"
      - "monotonic_time"
      - "reasonable_charge"

global:
  max_total_retries: 20
  abort_on_critical: true
  log_all_gate_results: true
  version: "1.0"
