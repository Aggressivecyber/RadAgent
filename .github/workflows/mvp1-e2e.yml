name: MVP-1 E2E

on:
  push:
    branches: [main]
    paths:
      - 'agent_core/**'
      - 'tests/e2e/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"

      - name: Run E2E pipeline tests
        id: e2e
        continue-on-error: true
        run: pytest tests/e2e/ -v --tb=short

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mvp1-e2e-review
          path: review_artifacts/g4_complex_model/latest/
          retention-days: 30
          if-no-files-found: ignore

      - name: Check E2E result
        if: steps.e2e.outcome == 'failure'
        run: |
          echo "::error::MVP-1 E2E pipeline tests failed"
          exit 1
