name: Fast CI

on:
  workflow_dispatch:

jobs:
  fast-ci:
    runs-on: ubuntu-latest
    env:
      RADAGENT_MODEL_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall agent_core tests scripts
      - name: Lint
        run: ruff check agent_core tests scripts
      - name: Unit Tests
        run: pytest -q tests/unit
